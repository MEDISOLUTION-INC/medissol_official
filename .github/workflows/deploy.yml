name: Vercel Production Deployment
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Vercel CLI
        run: npm install --global vercel
      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN2 }}
        env:
          VERCEL_ORG_ID: team_Wx8dGI2A8INs30clobHg6nvV
          VERCEL_PROJECT_ID: prj_3XBBHAKpycDWjbc8CSWOFQbXggLe
      - name: Build Project Artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN2 }}
        env:
          VERCEL_ORG_ID: team_Wx8dGI2A8INs30clobHg6nvV
          VERCEL_PROJECT_ID: prj_3XBBHAKpycDWjbc8CSWOFQbXggLe
      - name: Deploy Project Artifacts to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN2 }}
        env:
          VERCEL_ORG_ID: team_Wx8dGI2A8INs30clobHg6nvV
          VERCEL_PROJECT_ID: prj_3XBBHAKpycDWjbc8CSWOFQbXggLe
